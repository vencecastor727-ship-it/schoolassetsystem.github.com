<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0f1a;--surface:#131929;--surface2:#1a2438;--border:#1e2d45;--accent:#6366f1;--accent2:#06b6d4;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
  .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;}
  .sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:800;font-size:18px;display:flex;align-items:center;gap:10px;}
  .sidebar-logo span{color:var(--accent2);}
  .role-badge{margin:0 20px 16px;padding:6px 12px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:6px;font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px;text-align:center;}
  .nav-section{padding:8px 12px;}
  .nav-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:8px 8px 4px;font-weight:600;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:2px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:rgba(99,102,241,0.15);color:var(--accent);}
  .nav-item .icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);}
  .logout-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;color:var(--red);cursor:pointer;font-size:13px;transition:background 0.2s;border:none;background:none;width:100%;font-family:inherit;}
  .main{margin-left:240px;flex:1;padding:28px 32px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
  .page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
  .user-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:30px;font-size:13px;}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;}
  .btn{padding:10px 18px;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;}
  .toolbar{display:flex;gap:12px;margin-bottom:18px;}
  .search-bar{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
  .search-bar:focus{border-color:var(--accent);}
  .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .user-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;}
  .user-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;}
  .ua-admin{background:linear-gradient(135deg,#6366f1,#818cf8);}
  .ua-staff{background:linear-gradient(135deg,#10b981,#34d399);}
  .user-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
  .user-email{font-size:12px;color:var(--muted);margin-top:3px;}
  .user-role{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;margin-top:10px;}
  .r-admin{background:rgba(99,102,241,0.15);color:#818cf8;}
  .r-staff{background:rgba(16,185,129,0.15);color:var(--green);}
  .user-meta{font-size:12px;color:var(--muted);margin-top:10px;}
  .card-actions{position:absolute;top:16px;right:16px;display:flex;gap:6px;}
  .icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
  .icon-btn:hover{background:var(--accent);border-color:var(--accent);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:440px;}
  .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:20px;}
  .form-group{margin-bottom:16px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;}
  input,select.fi{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
  input:focus{border-color:var(--accent);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
  .btn-cancel{padding:10px 18px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
  .status-active{color:var(--green);font-size:12px;}
  .status-inactive{color:var(--muted);font-size:12px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><span>🏫</span> School<span>Asset</span></div>
  <div class="role-badge">👑 Admin Panel</div>
  <nav class="nav-section">
    <div class="nav-label">Overview</div>
    <a class="nav-item" href="admin-dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <div class="nav-label">Asset Management</div>
    <a class="nav-item" href="admin-assets.html"><span class="icon">📦</span> All Assets</a>
    <a class="nav-item" href="admin-add-asset.html"><span class="icon">➕</span> Add Asset</a>
    <a class="nav-item" href="admin-categories.html"><span class="icon">🗂️</span> Categories</a>
    <div class="nav-label">Operations</div>
    <a class="nav-item" href="admin-borrowing.html"><span class="icon">🔄</span> Borrowing</a>
    <a class="nav-item" href="admin-maintenance.html"><span class="icon">🔧</span> Maintenance</a>
    <a class="nav-item" href="admin-reports.html"><span class="icon">📋</span> Reports</a>
    <div class="nav-label">System</div>
    <a class="nav-item active" href="admin-users.html"><span class="icon">👥</span> Users</a>
  </nav>
  <div class="sidebar-footer"><button class="logout-btn" onclick="logout()">🚪 Logout</button></div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="page-title">User Management</div>
    <div style="display:flex;gap:12px;align-items:center;">
      <button class="btn btn-primary" onclick="openModal()">👤 Add User</button>
      <div class="user-chip"><div class="avatar">👑</div> <span id="uname">Admin</span></div>
    </div>
  </div>
  <div class="toolbar">
    <input class="search-bar" id="search" placeholder="🔍  Search users..." oninput="render()">
    <select style="padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none" id="roleFilter" onchange="render()">
      <option value="">All Roles</option><option>Admin</option><option>Staff</option>
    </select>
  </div>
  <div class="users-grid" id="usersGrid"></div>
</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="mTitle">Add New User</div>
    <div class="form-group"><label>Full Name</label><input id="mName" placeholder="e.g. Maria Santos"></div>
    <div class="form-group"><label>Email</label><input id="mEmail" type="email" placeholder="e.g. msantos@school.edu"></div>
    <div class="form-group"><label>Role</label>
      <select class="fi" id="mRole"><option>Staff</option><option>Admin</option></select>
    </div>
    <div class="form-group"><label>Department</label><input id="mDept" placeholder="e.g. Science Dept."></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>
<script>
  if(!sessionStorage.getItem('role')||sessionStorage.getItem('role')!=='admin') window.location.href='login.html';
  document.getElementById('uname').textContent=sessionStorage.getItem('user')||'Admin';
  let users=JSON.parse(localStorage.getItem('sysUsers')||'null')||[
    {id:'USR-001',name:'System Admin',email:'admin@school.edu',role:'Admin',dept:'Administration',status:'Active'},
    {id:'USR-002',name:'Maria Santos',email:'msantos@school.edu',role:'Staff',dept:'Science Dept.',status:'Active'},
    {id:'USR-003',name:'Jose Reyes',email:'jreyes@school.edu',role:'Staff',dept:'IT Dept.',status:'Active'},
    {id:'USR-004',name:'Ana Cruz',email:'acruz@school.edu',role:'Staff',dept:'Math Dept.',status:'Inactive'},
  ];
  function saveUsers(){localStorage.setItem('sysUsers',JSON.stringify(users));}
  function render(){
    const q=document.getElementById('search').value.toLowerCase();
    const rf=document.getElementById('roleFilter').value;
    const data=users.filter(u=>(!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q))&&(!rf||u.role===rf));
    document.getElementById('usersGrid').innerHTML=data.map((u,i)=>`
      <div class="user-card">
        <div class="card-actions">
          <button class="icon-btn" onclick="delUser(${users.indexOf(u)})">🗑️</button>
        </div>
        <div class="user-avatar ${u.role==='Admin'?'ua-admin':'ua-staff'}">${u.role==='Admin'?'👑':'🧑‍💼'}</div>
        <div class="user-name">${u.name}</div>
        <div class="user-email">${u.email}</div>
        <span class="user-role ${u.role==='Admin'?'r-admin':'r-staff'}">${u.role}</span>
        <div class="user-meta">📁 ${u.dept}</div>
        <div class="user-meta ${u.status==='Active'?'status-active':'status-inactive'}">● ${u.status}</div>
      </div>`).join('');
  }
  function delUser(i){if(confirm('Remove user?')){users.splice(i,1);saveUsers();render();}}
  function openModal(){document.getElementById('modal').classList.add('open');}
  function closeModal(){document.getElementById('modal').classList.remove('open');}
  function saveUser(){
    const name=document.getElementById('mName').value;
    const email=document.getElementById('mEmail').value;
    const role=document.getElementById('mRole').value;
    const dept=document.getElementById('mDept').value;
    if(!name||!email){alert('Fill required fields.');return;}
    users.push({id:'USR-'+String(users.length+1).padStart(3,'0'),name,email,role,dept,status:'Active'});
    saveUsers();closeModal();render();
    document.getElementById('mName').value='';document.getElementById('mEmail').value='';document.getElementById('mDept').value='';
  }
  function logout(){sessionStorage.clear();window.location.href='login.html';}
  render();
</script>
</body>
</html>
